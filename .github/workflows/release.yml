name: Release

# Triggered when a `v*` tag is pushed. Builds the WP plugin zip via
# scripts/build-zip.sh and attaches it (clobber on re-tag) to the GitHub
# release matching the tag. The zip filename has no version suffix so the
# `releases/latest/download/rolepod-wp.zip` URL stays stable — that URL is
# what the MCP side ships to users in install guidance.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build plugin zip
        run: ./scripts/build-zip.sh

      - name: Verify zip contents
        run: |
          test -f dist/rolepod-wp.zip
          unzip -l dist/rolepod-wp.zip | grep -q 'rolepod-wp.php'
          unzip -l dist/rolepod-wp.zip | grep -q 'src/Endpoint/Pair.php'
          unzip -l dist/rolepod-wp.zip | grep -q 'assets/admin.css'
          unzip -l dist/rolepod-wp.zip | grep -q 'assets/admin.js'

      - name: Ensure release exists for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Upload zip asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/rolepod-wp.zip --clobber
